# This workflow runs an OWASP dependency-check scan on the 'hapi-fhir-validation' module.
# If vulnerabilities are found, it creates a detailed GitHub issue and provides a summary.

name: HAPI FHIR Validation Dependency Scan

on:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Monday at midnight UTC
  push:
    branches: [ 5.1.0-patch1 ]
    paths:
      - 'hapi-fhir-validation/pom.xml'
  pull_request:
    branches: [ 5.1.0-patch1 ]
    paths:
      - 'hapi-fhir-validation/pom.xml'
  workflow_dispatch: # Allows manual triggering of the workflow

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    
    # Define outputs that will be used by other jobs
    outputs:
      vuln_count: ${{ steps.process_results.outputs.vuln_count }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Cache NVD database
      uses: actions/cache@v4
      with:
        path: ${{ github.workspace }}/dependency-check-data
        key: ${{ runner.os }}-nvd-data-v1-${{ hashFiles('**/pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-nvd-data-v1-

    - name: Run Maven Dependency-Check
      working-directory: ./hapi-fhir-validation
      run: |
        mkdir -p ${{ github.workspace }}/target
        mkdir -p ${{ github.workspace }}/dependency-check-data
        
        # Run Maven with Debug flag (-X) for verbose logging
        mvn -X org.owasp:dependency-check-maven:check \
          -Dformats=JSON \
          -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -DoutputDirectory=${{ github.workspace }}/target \
          -DdataDirectory=${{ github.workspace }}/dependency-check-data \
          -DfailOnCVSS=0
          
        # Add an immediate check to see if the report was generated
        if [ ! -f "${{ github.workspace }}/target/dependency-check-report.json" ]; then
          echo "::error::Maven dependency-check did not generate a report file."
          exit 1
        else
          echo "Successfully generated dependency-check report."
        fi
    
    - name: Process scan results and generate issue body
      id: process_results
      run: |
        REPORT_FILE="${{ github.workspace }}/target/dependency-check-report.json"
        
        if [ ! -f "$REPORT_FILE" ]; then
          echo "Report file not found!"
          echo "vuln_count=0" >> $GITHUB_OUTPUT
          exit 0
        fi

        VULN_DATA=$(jq '[.dependencies[] | select(.vulnerabilities) | . as $dep | .vulnerabilities[] | {fileName: $dep.fileName, cve: .name, severity: .severity, description: .description}]' "$REPORT_FILE")
        VULN_COUNT=$(echo "$VULN_DATA" | jq 'length')

        # Set the vulnerability count as an output
        echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT

        # Only generate the issue body if vulnerabilities were found
        if [ "$VULN_COUNT" -gt 0 ]; then
          echo "Vulnerabilities found: $VULN_COUNT. Generating issue body."
          ISSUE_BODY=$(echo "$VULN_DATA" | jq -r --arg date "${{ github.run_started_at }}" --arg actor "${{ github.triggering_actor }}" --arg event "${{ github.event_name }}" '
          (
            ["### 🚨 OWASP Dependency-Check Security Scan Report"],
            [""],
            ["A security scan has detected **" + (length | tostring) + " vulnerabilities** in the `hapi-fhir-validation` module."],
            ["- **Scan Date:** \($date)"],
            ["- **Triggered by:** `\($actor)` on event `\($event)`"],
            [""],
            ["Please review the vulnerabilities below and take appropriate action. A full JSON report is available as a workflow artifact."],
            [""],
            ["| Severity | CVE | Affected Package | Description |"],
            ["|:---|:---|:---|:---|"],
            (.[] | "| **\(.severity)** | \(.cve) | `\(.fileName)` | \(.description) |")
          ) | .[]
          ')

          # Set the multiline output for the issue body using the correct syntax
          echo "issue_body<<DELIMITER" >> $GITHUB_OUTPUT
          echo "$ISSUE_BODY" >> $GITHUB_OUTPUT
          echo "DELIMITER" >> $GITHUB_OUTPUT
        fi

    - name: Upload scan reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: |
          ${{ github.workspace }}/target/dependency-check-report.json
          ${{ github.workspace }}/dependency-check-data/

    - name: Create GitHub Issue on failure
      # Use a more reliable numeric comparison based on the vulnerability count
      if: steps.process_results.outputs.vuln_count > 0
      uses: JasonEtco/create-an-issue@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        title: "Security Scan: ${{ steps.process_results.outputs.vuln_count }} vulnerabilities found in hapi-fhir-validation"
        body: ${{ steps.process_results.outputs.issue_body }}
        labels: |
          security
          vulnerability
          automated scan
        assignees: ${{ github.triggering_actor }}

  summary:
    runs-on: ubuntu-latest
    needs: dependency-scan
    if: always()
    steps:
    - name: Generate scan summary
      run: |
        echo "### HAPI FHIR Validation Dependency Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Module**: hapi-fhir-validation" >> $GITHUB_STEP_SUMMARY
        VULN_COUNT="${{ needs.dependency-scan.outputs.vuln_count || 0 }}"
        echo "**Vulnerabilities Found**: $VULN_COUNT" >> $GITHUB_STEP_SUMMARY
        
        # Use a more reliable numeric comparison for the status
        if [ "$VULN_COUNT" -gt 0 ]; then
          echo "**Status**: ❌ Vulnerabilities detected" >> $GITHUB_STEP_SUMMARY
        else
          echo "**Status**: ✅ No vulnerabilities found" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "The full JSON report is available as a workflow artifact named 'dependency-report'." >> $GITHUB_STEP_SUMMARY
