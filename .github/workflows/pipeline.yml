name: HAPI FHIR Dependency Scan

on:
  schedule:
    - cron: '0 0 * * 1' # weekly on Monday midnight
  push:
    branches: [5.1.0-patch1]
  pull_request:
    branches: [5.1.0-patch1]
  workflow_dispatch:

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ["hapi-fhir-validation", "hapi-fhir-validation-resources-r5"]
    name: Scan ${{ matrix.module }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache NVD database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-nvd-data-${{ matrix.module }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-nvd-data-

      - name: Run Dependency-Check
        id: run_scan
        run: |
          LOG_DIR="${{ matrix.module }}/target/dependency-check"
          mkdir -p "$LOG_DIR"

          echo "🔎 Scanning module folder: ${{ matrix.module }}"
          mvn -B -pl "${{ matrix.module }}" org.owasp:dependency-check-maven:check \
              -am \
              -Dformat=ALL \
              -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
              -DoutputDirectory="$LOG_DIR" \
              --log-file "$LOG_DIR/mvn.log"


          REPORT_FILE="$LOG_DIR/dependency-check-report.json"
          if [ -f "$REPORT_FILE" ]; then
            VULN_COUNT=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")
            CVES=$(jq -r '[.dependencies[].vulnerabilities[]?.name] | join(", ")' "$REPORT_FILE")
          else
            VULN_COUNT=0
            CVES=""
          fi

          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "cves=$CVES" >> $GITHUB_OUTPUT

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report-${{ matrix.module }}
          path: ${{ matrix.module }}/target/dependency-check/

  create-issues:
    needs: dependency-scan
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ["hapi-fhir-validation", "hapi-fhir-validation-resources-r5"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create issue if vulnerabilities found
        if: needs.dependency-scan.outputs.vuln_count != '0'
        uses: JasonEtco/create-an-issue@v2
        with:
          title: "Security scan detected ${{ needs.dependency-scan.outputs.vuln_count }} vulnerability(s) in ${{ matrix.module }}"
          filename: .github/ISSUE_TEMPLATE/dep-scan2.md
          update_existing: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MODULE: ${{ matrix.module }}
          VULN_COUNT: ${{ needs.dependency-scan.outputs.vuln_count }}
          CVES: ${{ needs.dependency-scan.outputs.cves }}
          SCAN_DATE: ${{ github.run_started_at }}

  summary:
    needs: dependency-scan
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Generate workflow summary
        run: |
          echo "### HAPI FHIR Dependency Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Scan Date:** $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
          for mod in hapi-fhir-validation hapi-fhir-validation-resources-r5; do
            echo "**$mod Vulnerabilities:** ${{ needs.dependency-scan.outputs.vuln_count }}" >> $GITHUB_STEP_SUMMARY
          done
          echo ""
          echo "Scan reports are available as workflow artifacts." >> $GITHUB_STEP_SUMMARY
