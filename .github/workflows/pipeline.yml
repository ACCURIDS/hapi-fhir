name: HAPI FHIR Validation Dependency Scan
 
on:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Monday at midnight
  push:
    branches: [ 5.1.0-patch1 ]
    paths:
      - 'hapi-fhir-validation/pom.xml'
      - '**/dependencies/**'
  pull_request:
    branches: [ 5.1.0-patch1 ]
    paths:
      - 'hapi-fhir-validation/pom.xml'
      - '**/dependencies/**'
  workflow_dispatch:  # Allows manual runs

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hapi-fhir-validation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Cache NVD database
      uses: actions/cache@v3
      with:
        path: ../dependency-check-data
        key: ${{ runner.os }}-nvd-data-${{ hashFiles('pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-nvd-data-

    - name: Run Maven Dependency-Check with correct parameters
      id: security_scan
      run: |
        # Create data directory
        mkdir -p ../dependency-check-data
        
        # Run with correct parameter names
        mvn org.owasp:dependency-check-maven:check \
          -Dformats=JSON \
          -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -DoutputDirectory=../target \
          -DdataDirectory=../dependency-check-data \
          -DnvdApiDelay=2000 \
          -DfailOnCVSS=0


    - name: Check if report was generated
      run: |
       if [ -f "target/dependency-check-report.json" ]; then
         echo "Report generated successfully"
       else
         echo "Report generation failed, trying alternative approach..."
         exit 1
       fi

    - name: Alternative approach using CLI with correct parameters
      if: failure() && steps.security_scan.conclusion == 'failure'
      run: |
        # Download OWASP Dependency-Check
        wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v8.3.1/dependency-check-8.3.1-release.zip
        unzip -q dependency-check-8.3.1-release.zip
        
        # Run with correct CLI parameters (different from Maven plugin!)
        ./dependency-check/bin/dependency-check.sh \
          --project "hapi-fhir-validation" \
          --scan "." \
          --out "../target" \
          --format "JSON" \
          --data "../dependency-check-data" \
          --noupdate \
          --failOnCVSS 0

    - name: Process scan results
      id: process_results
      run: |
        REPORT_FILE="target/dependency-check-report.json"
        
        if [ -f "$REPORT_FILE" ]; then
          # Count vulnerabilities
          VULN_COUNT=$(jq '.dependencies[].vulnerabilities | length' "$REPORT_FILE" | awk '{sum+=$1} END {print sum}')
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "vuln_count=0" >> $GITHUB_OUTPUT
          echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          echo "No report file found" >&2
        fi

    - name: Upload scan reports
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: |
          target/
          dependency-check-data/

    - name: Create GitHub Issue
      if: env.VULN_COUNT != '0'
      uses: JasonEtco/create-an-issue@v2
      env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VULN_COUNT: ${{ env.VULN_COUNT }}
          SCAN_DATE: ${{ env.SCAN_DATE }}
          SUMMARY: ${{ env.SUMMARY }}
      with:
          filename: .github/ISSUE_TEMPLATE/dependency-scan.md

  summary:
    runs-on: ubuntu-latest
    needs: dependency-scan
    if: always()
    
    steps:
    - name: Generate scan summary
      run: |
        echo "### HAPI FHIR Validation Dependency Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Module**: hapi-fhir-validation" >> $GITHUB_STEP_SUMMARY
        echo "**Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
        echo "**Vulnerabilities Found**: ${{ needs.dependency-scan.outputs.vuln_count || 0 }}" >> $GITHUB_STEP_SUMMARY
        echo "**Status**: ${{ needs.dependency-scan.outputs.has_vulnerabilities == 'true' && '❌ Vulnerabilities detected' || '✅ No vulnerabilities found' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Scan reports are available as workflow artifacts." >> $GITHUB_STEP_SUMMARY
