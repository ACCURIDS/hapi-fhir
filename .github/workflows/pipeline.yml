name: HAPI FHIR Dependency Scan

on:
  schedule:
    - cron: '0 0 * * 1' # weekly on Monday midnight
  push:
    branches: [5.1.0-patch1]
  pull_request:
    branches: [5.1.0-patch1]
  workflow_dispatch:
  
jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: 
          - hapi-fhir-validation
          - hapi-fhir-validation-resources-r5
    name: Scan ${{ matrix.module }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          
      - name: Set scan date
        run: echo "SCAN_DATE=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_ENV
        
      - name: Run Dependency-Check
        id: run_scan
        run: |
          LOG_DIR="${{ matrix.module }}/target"
          mkdir -p "$LOG_DIR"
          mvn -B -pl "${{ matrix.module }}" org.owasp:dependency-check-maven:check \
              -Dformats=JSON \
              -DoutputDirectory="$LOG_DIR" \
              -DfailBuildOnAnyVulnerability=false

          REPORT_FILE="$LOG_DIR/dependency-check-report.json"
          if [ -f "$REPORT_FILE" ]; then
            VULN_COUNT=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")
            CVES=$(jq -r '[.dependencies[].vulnerabilities[]?.name] | join(", ")' "$REPORT_FILE")
          else
            VULN_COUNT=0
            CVES=""
          fi

          echo "VULN_COUNT=$VULN_COUNT" >> $GITHUB_ENV
          echo "CVES=$CVES" >> $GITHUB_ENV

      - name: Create or update issue
        uses: JasonEtco/create-an-issue@v2
        with:
          filename: .github/ISSUE_TEMPLATE/dep-scan2.md
          update_existing: true
          search_existing: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SCAN_DATE: ${{ steps.scan.outputs.date }}
          VULN_COUNT: ${{ steps.scan.outputs.vuln_count }}
          CVES: ${{ steps.scan.outputs.cves }}

      - name: Upload scan report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report-${{ matrix.module }}
          path: ${{ matrix.module }}/target/
          
