name: HAPI FHIR Dependency Scan

on:
  schedule:
    - cron: '0 0 * * 1'  # Weekly on Monday at midnight
  push:
    branches: [5.1.0-patch1]
    paths:
      - '**/pom.xml'
      - '**/dependencies/**'
  pull_request:
    branches: [5.1.0-patch1]
    paths:
      - '**/pom.xml'
      - '**/dependencies/**'
  workflow_dispatch:

env:
  MODULES: "hapi-fhir-validation hapi-fhir-validation-resources-r5"

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    outputs:
      vuln_count: ${{ steps.process_results.outputs.vuln_count }}
      has_vulnerabilities: ${{ steps.process_results.outputs.has_vulnerabilities }}
      cves: ${{ steps.process_results.outputs.cves }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Cache NVD database
        uses: actions/cache@v3
        with:
          path: ../dependency-check-data
          key: ${{ runner.os }}-nvd-data-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-nvd-data-

      - name: Run Maven Dependency-Check for all modules
        id: security_scan
        run: |
          mkdir -p ../dependency-check-data

          for mod in $MODULES; do
            echo "🔎 Scanning module: $mod"
            mkdir -p "../target/$mod"

            mvn -pl "$mod" org.owasp:dependency-check-maven:check \
              -Dformats=JSON \
              -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
              -DoutputDirectory="../target/$mod" \
              -DdataDirectory="../dependency-check-data" \
              -DnvdApiDelay=2000 \
              -DfailOnCVSS=0
          done

      - name: Process scan results
        id: process_results
        run: |
          TOTAL_VULN=0
          ALL_CVES=""

          for mod in $MODULES; do
            REPORT_FILE="$mod/target/dependency-check-report.json"
            if [ -f "$REPORT_FILE" ]; then
              VULN_COUNT=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")
              CVES=$(jq -r '[.dependencies[].vulnerabilities[]?.name] | join(", ")' "$REPORT_FILE")
              TOTAL_VULN=$((TOTAL_VULN + VULN_COUNT))
              ALL_CVES="$ALL_CVES $CVES"
            fi
          done

          echo "vuln_count=$TOTAL_VULN" >> $GITHUB_OUTPUT
          echo "cves=$ALL_CVES" >> $GITHUB_OUTPUT
          if [ "$TOTAL_VULN" -gt 0 ]; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload scan reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: |
            target/*
            dependency-check-data/
          
  create-issue:
    needs: dependency-scan
    runs-on: ubuntu-latest
    if: needs.dependency-scan.outputs.has_vulnerabilities == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v3
  
      - name: Create issues for each module
        run: |
          MODULES="hapi-fhir-validation hapi-fhir-validation-resources-r5"
  
          for mod in $MODULES; do
            REPORT_FILE="$mod/target/dependency-check-report.json"
            if [ -f "$REPORT_FILE" ]; then
              VULN_COUNT=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")
              if [ "$VULN_COUNT" -gt 0 ]; then
                CVES=$(jq -r '[.dependencies[].vulnerabilities[]?.name] | join(", ")' "$REPORT_FILE")
  
                # Export environment variables for your template
                echo "MODULE=$mod" >> $GITHUB_ENV
                echo "VULN_COUNT=$VULN_COUNT" >> $GITHUB_ENV
                echo "CVES=$CVES" >> $GITHUB_ENV
                echo "SCAN_DATE=${{ github.run_started_at }}" >> $GITHUB_ENV
  
                echo "Checking if issue already exists for module: $mod"
  
                # Search for an existing open issue with the module name in the title
                EXISTING=$(gh issue list \
                  --repo "$GITHUB_REPOSITORY" \
                  --label "security,dependencies,automated" \
                  --state open \
                  --search "$mod" \
                  --json number \
                  | jq '.[0].number // empty')
  
                if [ -n "$EXISTING" ]; then
                  echo "❌ Issue already exists (#$EXISTING) for module $mod, skipping creation."
                else
                  echo "✅ Creating new issue for module $mod"
                  gh issue create \
                    --title "Security scan detected $VULN_COUNT vulnerability(s) in $mod" \
                    --body "$(envsubst < .github/ISSUE_TEMPLATE/dep-scan2.md)" \
                    --label "security,dependencies,automated" \
                    --repo "$GITHUB_REPOSITORY"
                fi
              fi
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  summary:
    runs-on: ubuntu-latest
    needs: dependency-scan
    if: always()
    steps:
    - name: Generate scan summary
      run: |
        echo "### HAPI FHIR Validation Dependency Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Module**: hapi-fhir-validation" >> $GITHUB_STEP_SUMMARY
        echo "**Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
        echo "**Vulnerabilities Found**: ${{ needs.dependency-scan.outputs.vuln_count || 0 }}" >> $GITHUB_STEP_SUMMARY
        echo "**Status**: ${{ needs.dependency-scan.outputs.has_vulnerabilities == 'true' && '❌ Vulnerabilities detected' || '✅ No vulnerabilities found' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Scan reports are available as workflow artifacts." >> $GITHUB_STEP_SUMMARY
