name: HAPI FHIR Dependency Scan

on:

   schedule:
      - cron: '0 0 * * 1' # weekly on Monday midnight
   push:
      branches: [5.1.0-patch1]
   pull_request:
      branches: [5.1.0-patch1]
   workflow_dispatch:


jobs:
   dependency-scan:
      runs-on: ubuntu-latest
      strategy:
         matrix:
            module:
               - hapi-fhir-validation
               - hapi-fhir-validation-resources-r5
      name: Scan ${{ matrix.module }}
      steps:
         - name: Checkout code
           uses: actions/checkout@v4

         - name: Set up Java
           uses: actions/setup-java@v4
           with:
              distribution: 'temurin'
              java-version: '17'
              cache: 'maven'

         - name: Run Dependency-Check
           id: run_scan
           run: |
              LOG_DIR="${{ matrix.module }}/target"
              mkdir -p "$LOG_DIR"
              mvn -B -pl "${{ matrix.module }}" org.owasp:dependency-check-maven:check \
                  -Dformats=JSON \
                  -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
                  -DoutputDirectory="$LOG_DIR" \
                  -DfailBuildOnAnyVulnerability=false
              REPORT_FILE="$LOG_DIR/dependency-check-report.json"
              if [ -f "$REPORT_FILE" ]; then
                VULN_COUNT=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")
                CVES=$(jq -r '[.dependencies[].vulnerabilities[]?.name] | join(", ")' "$REPORT_FILE")
              else
                VULN_COUNT=0
                CVES=""
              fi
              echo "VULN_COUNT=$VULN_COUNT" >> $GITHUB_ENV
              echo "CVES=$CVES" >> $GITHUB_ENV
         - name: Create GitHub Issue if vulnerabilities found
           if: env.VULN_COUNT != '0'
           uses: JasonEtco/create-an-issue@v2
           with:
              title: "Security scan detected ${{ env.VULN_COUNT }} vulnerability(s) in ${{ matrix.module }}"
              filename: .github/ISSUE_TEMPLATE/scan-Template.md
              update_existing: true
           env:
              GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              MODULE: ${{ matrix.module }}
              VULN_COUNT: ${{ env.VULN_COUNT }}
              CVES: ${{ env.CVES }}
              SCAN_DATE: ${{ github.run_started_at }}

         - name: Upload scan report
           uses: actions/upload-artifact@v4
           with:
              name: dependency-report-${{ matrix.module }}
              path: ${{ matrix.module }}/target/
