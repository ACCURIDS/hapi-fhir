
name: HAPI FHIR Validation Dependency Scan

on:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Monday at midnight
  push:
    branches: [ 5.1.0-patch1 ]
    paths:
      - 'hapi-fhir-validation/pom.xml'
      - '**/dependencies/**'
  pull_request:
    branches: [ 5.1.0-patch1 ]
    paths:
      - 'hapi-fhir-validation/pom.xml'
      - '**/dependencies/**'
  workflow_dispatch:

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hapi-fhir-validation
    outputs:
      vuln_count: ${{ steps.process_results.outputs.vuln_count }}
      has_vulnerabilities: ${{ steps.process_results.outputs.has_vulnerabilities }}
      cves: ${{ steps.process_results.outputs.cves }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Cache NVD database
      uses: actions/cache@v3
      with:
        path: ../dependency-check-data
        key: ${{ runner.os }}-nvd-data-${{ hashFiles('pom.xml') }}
        restore-keys: |
          ${{ runner.os }}-nvd-data-
    - name: Run Maven Dependency-Check
      id: security_scan
      run: |
        mkdir -p ../dependency-check-data
        mvn org.owasp:dependency-check-maven:check \
          -Dformats=JSON \
          -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
          -DoutputDirectory=../target \
          -DdataDirectory=../dependency-check-data \
          -DnvdApiDelay=2000 \
          -DfailOnCVSS=0
    - name: Check if report exists
      run: |
        if [ -f "target/dependency-check-report.json" ]; then
          echo "Report generated successfully"
        else
          echo "Report not found, failing..."
          exit 1
        fi
    - name: Process scan results
      id: process_results
      run: |
        REPORT_FILE="target/dependency-check-report.json"
    
        if [ -f "$REPORT_FILE" ]; then
          VULN_COUNT=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")
          CVES=$(jq -r '[.dependencies[].vulnerabilities[]?.name] | join(", ")' "$REPORT_FILE")
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          echo "cves=$CVES" >> $GITHUB_OUTPUT
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "vuln_count=0" >> $GITHUB_OUTPUT
          echo "cves=" >> $GITHUB_OUTPUT
          echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload scan reports
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report
        path: |
          target/
          dependency-check-data/
          
  create-issue:
    needs: dependency-scan
    runs-on: ubuntu-latest
    if: needs.dependency-scan.outputs.has_vulnerabilities == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Create GitHub Issue
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VULN_COUNT: ${{ needs.dependency-scan.outputs.vuln_count }}
          CVES: ${{ needs.dependency-scan.outputs.cves }}
          SCAN_DATE: ${{ github.run_started_at }}
        with:
          title: "Security scan detected ${{ needs.dependency-scan.outputs.vuln_count }} vulnerability(s)"
          filename: .github/ISSUE_TEMPLATE/dep-scan.md


  summary:
    runs-on: ubuntu-latest
    needs: dependency-scan
    if: always()
    steps:
    - name: Generate scan summary
      run: |
        echo "### HAPI FHIR Validation Dependency Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Module**: hapi-fhir-validation" >> $GITHUB_STEP_SUMMARY
        echo "**Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
        echo "**Vulnerabilities Found**: ${{ needs.dependency-scan.outputs.vuln_count || 0 }}" >> $GITHUB_STEP_SUMMARY
        echo "**Status**: ${{ needs.dependency-scan.outputs.has_vulnerabilities == 'true' && '❌ Vulnerabilities detected' || '✅ No vulnerabilities found' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Scan reports are available as workflow artifacts." >> $GITHUB_STEP_SUMMARY
