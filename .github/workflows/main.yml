name: Dependency Check

on:
  push:
    branches:
      - 5.1.0-patch1
  pull_request:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read
  issues: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Dependency-Check Data
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository/org/owasp/dependency-check-data
            ~/.m2/repository/org/owasp/dependency-check-maven
          key: ${{ runner.os }}-dependency-check

      - name: Run Dependency-Check (Selected Modules)
        run: |
          set -e
          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          for mod in "${MODULES[@]}"; do
            echo "🔎 Scanning module: $mod"
            LOG_DIR="target/dependency-check/$mod"
            mkdir -p "$LOG_DIR"
            
            # Run dependency check with explicit report name
            mvn -B -pl "$mod" dependency-check:check \
              -am \
              -Dformats=JSON \
              -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
              -DoutputDirectory="$LOG_DIR" \
              -DdataDirectory="$LOG_DIR/data" \
              --log-file "$LOG_DIR/mvn.log"
            
            echo "---- DEBUG: What reports exist for $mod ----"
            
            # Look for reports in the module-specific directory
            find "$LOG_DIR" -type f -name "*.json" || true
            find "$LOG_DIR" -type f -name "*.html" || true
            find "$LOG_DIR" -type f -name "*.xml" || true
            
            # Also check the module's target directory
            MODULE_TARGET_DIR="$mod/target"
            if [ -d "$MODULE_TARGET_DIR" ]; then
              find "$MODULE_TARGET_DIR" -type f -name "dependency-check-report.*" || true
            fi
          done

      - name: Upload Maven Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maven-logs
          path: target/dependency-check/**/*.log
          if-no-files-found: ignore

      - name: Upload Dependency Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: target/dependency-check/**/*
          if-no-files-found: ignore

      - name: Display Dependency Check Results in Logs
        id: summarize
        run: |
          echo "📊 DEPENDENCY CHECK RESULTS SUMMARY"
          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          TOTAL_VULNERABILITIES=0
          MODULES_WITH_VULNS=()
          

          for mod in "${MODULES[@]}"; do
            REPORT_FILE="target/dependency-check/$mod/dependency-check-report.json"
            echo "---- DEBUG: FULL REPORT for $mod ----"
            cat "$REPORT_FILE" | jq .
            echo "---- DEBUG: Report metadata ----"
            jq '.dependencies[0:3]' "$REPORT_FILE"
            if [ -f "$REPORT_FILE" ]; then
              VULN_DEPS=$(jq '[.dependencies[] | select(.vulnerabilities | length > 0)] | length' "$REPORT_FILE")
              if [ "$VULN_DEPS" -gt 0 ]; then
                MODULES_WITH_VULNS+=("$mod")
                TOTAL_VULNS=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")
                TOTAL_VULNERABILITIES=$((TOTAL_VULNERABILITIES + TOTAL_VULNS))
              fi
            fi
          done

          echo "Total Vulnerabilities: $TOTAL_VULNERABILITIES"
          echo "Modules with vulns: ${MODULES_WITH_VULNS[*]}"

          # Export as job outputs
          echo "modules_with_vulns=${MODULES_WITH_VULNS[*]}" >> $GITHUB_OUTPUT
          echo "total_vulns=$TOTAL_VULNERABILITIES" >> $GITHUB_OUTPUT

      - name: Process Module Reports for GitHub Issues
        if: steps.summarize.outputs.modules_with_vulns != ''
        run: |
          mkdir -p target/dependency-check/issues
          IFS=' ' read -ra MODULES <<< "${{ steps.summarize.outputs.modules_with_vulns }}"
          for mod in "${MODULES[@]}"; do
            REPORT_FILE="target/dependency-check/$mod/dependency-check-report.json"
            ISSUE_FILE="target/dependency-check/issues/$mod-issue.md"
            jq -r '...' "$REPORT_FILE" # (same jq extraction as before, unchanged)
          done

      - name: Create GitHub Issues
        if: steps.summarize.outputs.modules_with_vulns != ''
        run: |
          sudo apt-get update && sudo apt-get install -y gh
          IFS=' ' read -ra MODULES <<< "${{ steps.summarize.outputs.modules_with_vulns }}"
          for mod in "${MODULES[@]}"; do
            ISSUE_FILE="target/dependency-check/issues/$mod-issue.md"
            if [ -f "$ISSUE_FILE" ]; then
              gh issue create \
                --title "Dependency Check Alert: Vulnerabilities found in $mod module" \
                --body-file "$ISSUE_FILE" \
                --label security --label dependencies --label automated \
                --repo "$GITHUB_REPOSITORY"
            fi
          done

      - name: Log Clean Scan
        if: steps.summarize.outputs.modules_with_vulns == ''
        run: echo "✅ All modules are clean - no vulnerabilities found!"
