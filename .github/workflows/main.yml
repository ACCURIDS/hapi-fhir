# GitHub Actions workflow for running OWASP Dependency-Check
name: Dependency Check

on:
  push:
    branches:
      - 5.1.0-patch1
  pull_request:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday 9AM UTC

permissions:
  contents: read
  issues: write

env:
  NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/sup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Update NVD Database Cache
        run: |
          echo "🔄 Force updating NVD database cache..."
          mvn -B org.owasp:dependency-check-maven:purge
          mvn -B org.owasp:dependency-check-maven:update-only \
            -DnvdApiKey=$NVD_API_KEY

      - name: Run Dependency-Check with Correct Output Directory
        run: |
          set -e

          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          for mod in "${MODULES[@]}"; do
            echo "🔎 Scanning module: $mod"
            # Use a consistent output directory structure
            mvn -B -pl "$mod" org.owasp:dependency-check-maven:check \
              -am \
              -Dformat=ALL \
              -DnvdApiKey=$NVD_API_KEY \
              -DoutputDirectory="target/dependency-check-reports/$mod" \
              -DdataDirectory="target/dependency-check-data"
          done

      - name: Debug - List Generated Files
        run: |
          echo "📁 Listing all generated files:"
          find . -name "*dependency-check*" -type f | head -20
          echo ""
          echo "📁 Listing target directory:"
          ls -la target/ || echo "No target directory found"
          echo ""
          echo "📁 Listing dependency-check directories:"
          ls -la target/dependency-check*/ || echo "No dependency-check directories found"

      - name: Find and Process Dependency Check Reports
        id: find-reports
        run: |
          echo "🔍 Searching for dependency-check reports..."
          
          # Search for all possible report locations
          REPORTS=$(find . -name "dependency-check-report.json" -type f)
          echo "Found reports: $REPORTS"
          
          if [ -z "$REPORTS" ]; then
            echo "❌ No dependency-check reports found!"
            echo "Looking for any JSON files..."
            find . -name "*.json" -type f | head -10
            exit 1
          fi
          
          # Create a directory for processed reports
          mkdir -p processed-reports
          
          for report in $REPORTS; do
            echo "Processing report: $report"
            MODULE_NAME=$(echo $report | grep -oE "hapi-fhir-[^/]*" || echo "unknown-module")
            cp "$report" "processed-reports/$MODULE_NAME-report.json"
          done
          
          echo "REPORTS_PROCESSED=true" >> $GITHUB_ENV

      - name: Display Dependency Check Results
        if: env.REPORTS_PROCESSED == 'true'
        run: |
          echo "📊 DEPENDENCY CHECK RESULTS SUMMARY"
          echo "==================================="
          
          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          
          for mod in "${MODULES[@]}"; do
            echo ""
            echo "📦 Module: $mod"
            echo "-----------"
            
            # Check multiple possible report locations
            REPORT_PATHS=(
              "target/dependency-check-reports/$mod/dependency-check-report.json"
              "target/$mod/dependency-check-report.json"
              "$mod/target/dependency-check-report.json"
              "processed-reports/$mod-report.json"
              "processed-reports/unknown-module-report.json"
            )
            
            REPORT_FOUND=false
            
            for report_path in "${REPORT_PATHS[@]}"; do
              if [ -f "$report_path" ]; then
                echo "📄 Using report: $report_path"
                REPORT_FILE="$report_path"
                REPORT_FOUND=true
                break
              fi
            done
            
            if [ "$REPORT_FOUND" = false ]; then
              echo "❌ No report found for this module"
              continue
            fi
            
            # Get basic statistics
            TOTAL_DEPS=$(jq '.dependencies | length' "$REPORT_FILE")
            VULN_DEPS=$(jq '[.dependencies[] | select(.vulnerabilities != null and (.vulnerabilities | length) > 0)] | length' "$REPORT_FILE")
            TOTAL_VULNS=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")
            
            echo "📈 Total Dependencies: $TOTAL_DEPS"
            echo "⚠️  Vulnerable Dependencies: $VULN_DEPS"
            echo "🔴 Total Vulnerabilities: $TOTAL_VULNS"
            
            if [ "$VULN_DEPS" -gt 0 ]; then
              # Get severity breakdown
              SEVERITY_BREAKDOWN=$(jq -r '
                [.dependencies[].vulnerabilities[]?.severity] | 
                group_by(.) | 
                map("\(.[0]): \(length)") | 
                join(", ")
              ' "$REPORT_FILE")
              
              echo "📋 Severity Breakdown: $SEVERITY_BREAKDOWN"
              
              # Show all vulnerabilities
              echo ""
              echo "🚨 All Vulnerabilities Found:"
              jq -r '
                .dependencies[] | 
                select(.vulnerabilities != null) |
                . as $dep |
                .vulnerabilities[] |
                "   • \($dep.fileName) - \(.name) (\(.severity))"
              ' "$REPORT_FILE"
              
              # Specifically check for commons-lang and CVE-2025-48924
              echo ""
              echo "🔍 Checking for commons-lang and CVE-2025-48924:"
              CVE_RESULT=$(jq -r '
                .dependencies[] | 
                select(.fileName | test("commons-lang")) |
                select(.vulnerabilities != null) |
                . as $dep |
                .vulnerabilities[] |
                select(.name == "CVE-2025-48924") |
                "   ✅ FOUND: \($dep.fileName) - \(.name) (\(.severity))"
              ' "$REPORT_FILE")
              
              if [ ! -z "$CVE_RESULT" ]; then
                echo "$CVE_RESULT"
              else
                echo "   ❌ CVE-2025-48924 not found in commons-lang dependencies"
                
                # Show what commons-lang dependencies actually exist
                COMMONS_DEPS=$(jq -r '
                  .dependencies[] | 
                  select(.fileName | test("commons-lang")) |
                  "   • \(.fileName)@\(.version) - Vulnerabilities: \(if .vulnerabilities then .vulnerabilities | length else 0 end)"
                ' "$REPORT_FILE")
                
                if [ ! -z "$COMMONS_DEPS" ]; then
                  echo ""
                  echo "   📋 Existing commons-lang dependencies:"
                  echo "$COMMONS_DEPS"
                fi
              fi
              
            else
              echo "✅ No vulnerabilities found"
            fi
            
            echo ""
          done

      - name: Upload All Reports for Debugging
        uses: actions/upload-artifact@v4
        with:
          name: all-dependency-reports
          path: |
            target/
            processed-reports/
          if-no-files-found: ignore

      - name: Upload Maven Logs
        uses: actions/upload-artifact@v4
        with:
          name: maven-logs
          path: |
            **/mvn.log
            **/dependency-check.log
          if-no-files-found: ignore

      - name: Check if Any Vulnerabilities Were Found
        id: check-vulnerabilities
        run: |
          # Simple check if any reports exist with vulnerabilities
          ANY_VULNS=false
          for report in $(find . -name "dependency-check-report.json" -type f); do
            VULN_COUNT=$(jq '[.dependencies[] | select(.vulnerabilities != null and (.vulnerabilities | length) > 0)] | length' "$report")
            if [ "$VULN_COUNT" -gt 0 ]; then
              ANY_VULNS=true
              break
            fi
          done
          
          if [ "$ANY_VULNS" = true ]; then
            echo "VULNERABILITIES_FOUND=true" >> $GITHUB_ENV
            echo "🚨 Vulnerabilities detected!"
          else
            echo "✅ No vulnerabilities found in any module"
          fi


      - name: Create GitHub Issues
        if: env.MODULES_WITH_VULNS != ''
        run: |
          # Install GitHub CLI
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
          
          # Create issues for each module with vulnerabilities
          IFS=' ' read -ra MODULES <<< "$MODULES_WITH_VULNS"
          for mod in "${MODULES[@]}"; do
            echo "Creating issue for module: $mod"
            ISSUE_FILE="target/dependency-check/issues/$mod-issue.md"
            
            if [ -f "$ISSUE_FILE" ]; then
              TITLE="Dependency Check Alert: Vulnerabilities found in $mod module"
              BODY=$(cat "$ISSUE_FILE")
              
              # Create the issue using GitHub CLI
              gh issue create \
                --title "$TITLE" \
                --body "$BODY" \
                --label "security,dependencies,automated" \
                --repo "$GITHUB_REPOSITORY"
                
              echo "✅ Issue created for module: $mod"
            else
              echo "❌ Issue file not found for module: $mod"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Log Clean Scan
        if: env.VULNERABILITIES_FOUND != 'true'
        run: echo "✅ No CVEs found in any module - skipping issue creation."
