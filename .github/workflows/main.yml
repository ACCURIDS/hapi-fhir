name: HAPI FHIR Validation Dependency Scan

on:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Monday at midnight
  push:
    branches: [ 5.1.0-patch1 ]
    paths:
      - 'hapi-fhir-validation/pom.xml'
      - '**/dependencies/**'
  pull_request:
    branches: [ 5.1.0-patch1 ]
    paths:
      - 'hapi-fhir-validation/pom.xml'
      - '**/dependencies/**'
  workflow_dispatch:  # Allow manual triggering

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./hapi-fhir-validation
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Download OWASP Dependency-Check
      run: |
        wget -q https://github.com/jeremylong/DependencyCheck/releases/download/v8.3.1/dependency-check-8.3.1-release.zip
        unzip -q dependency-check-8.3.1-release.zip
        echo "DEPENDENCY_CHECK_HOME=$(pwd)/dependency-check" >> $GITHUB_ENV

    - name: Generate dependency tree
      run: |
        mvn dependency:tree -DoutputFile=../dependency-tree.txt -q
        echo "Dependency tree generated"

    - name: Run OWASP Dependency-Check
      id: security_scan
      run: |
        # Run dependency check
        $DEPENDENCY_CHECK_HOME/bin/dependency-check.sh \
          --project "hapi-fhir-validation" \
          --scan "." \
          --out "../reports" \
          --format "JSON" \
          --enableExperimental \
          --failOnCVSS 0 \
          --data "../dependency-check-data" || true

    - name: Process scan results
      id: process_results
      run: |
        cd ../reports
        
        if [ -f "dependency-check-report.json" ]; then
          # Count vulnerabilities
          VULN_COUNT=$(jq '.dependencies[].vulnerabilities | length' dependency-check-report.json | awk '{sum+=$1} END {print sum}')
          echo "vuln_count=$VULN_COUNT" >> $GITHUB_OUTPUT
          
          # Extract report data
          REPORT_DATA=$(jq -c '.' dependency-check-report.json)
          echo "report_data=$REPORT_DATA" >> $GITHUB_OUTPUT
          
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "has_vulnerabilities=true" >> $GITHUB_OUTPUT
          else
            echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "vuln_count=0" >> $GITHUB_OUTPUT
          echo "has_vulnerabilities=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload scan reports
      uses: actions/upload-artifact@v4
      with:
        name: hapi-fhir-validation-dependency-report
        path: |
          reports/
          dependency-tree.txt

    - name: Create GitHub Issue for vulnerabilities
      if: steps.process_results.outputs.has_vulnerabilities == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const reportData = '${{ steps.process_results.outputs.report_data }}';
          const vulnCount = parseInt('${{ steps.process_results.outputs.vuln_count }}');
          
          let report;
          try {
            report = JSON.parse(reportData);
          } catch (e) {
            console.error('Failed to parse report data:', e);
            return;
          }
          
          const issueTitle = `[Security] hapi-fhir-validation - ${vulnCount} vulnerability(s) detected`;
          
          // Check if issue already exists
          const existingIssues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: ['security', 'dependencies', 'hapi-fhir-validation']
          });
          
          const alreadyExists = existingIssues.data.some(issue => 
            issue.title.includes('hapi-fhir-validation') && 
            issue.title.includes('vulnerability')
          );
          
          if (!alreadyExists) {
            // Group vulnerabilities by severity
            const vulnerabilities = [];
            for (const dependency of report.dependencies || []) {
              for (const vuln of dependency.vulnerabilities || []) {
                vulnerabilities.push({
                  cve: vuln.name,
                  severity: vuln.severity || 'UNKNOWN',
                  package: dependency.fileName,
                  version: dependency.version,
                  description: vuln.description || 'No description available',
                  cvssScore: vuln.cvssv3?.baseScore || vuln.cvssv2?.score || 'N/A'
                });
              }
            }
            
            // Sort by severity
            vulnerabilities.sort((a, b) => {
              const severityOrder = {CRITICAL: 4, HIGH: 3, MEDIUM: 2, LOW: 1, UNKNOWN: 0};
              return severityOrder[b.severity] - severityOrder[a.severity];
            });
            
            let issueBody = `## 🔍 Dependency Security Scan - hapi-fhir-validation
          
            **Total Vulnerabilities**: ${vulnCount}
            **Scan Date**: ${new Date().toISOString()}
            **Module**: hapi-fhir-validation
            
            ### 📊 Vulnerability Summary
            `;
            
                        // Add severity breakdown
                        const severityCounts = {};
                        vulnerabilities.forEach(vuln => {
                          severityCounts[vuln.severity] = (severityCounts[vuln.severity] || 0) + 1;
                        });
                        
                        Object.entries(severityCounts).forEach(([severity, count]) => {
                          issueBody += `- **${severity}**: ${count}\n`;
                        });
            
                        issueBody += `
            ### 🎯 Top Vulnerabilities
            `;

            // Add top vulnerabilities
            vulnerabilities.slice(0, 10).forEach((vuln, index) => {
              issueBody += `
              #### ${index + 1}. ${vuln.cve} (${vuln.severity})
              **Package**: ${vuln.package}@${vuln.version}
              **CVSS Score**: ${vuln.cvssScore}
              
              ${vuln.description.substring(0, 250)}...
              `;
                          });
              
                          issueBody += `
              ### 📝 Scan Details
              - **Run ID**: ${context.runId}
              - **Commit**: ${context.sha}
              - **Scanner**: OWASP Dependency-Check
              - **Report**: Available as workflow artifact
              
              ### 🔧 Next Steps
              1. Review the detailed vulnerability report
              2. Update affected dependencies
              3. Consider security patches or alternative libraries
              4. Re-scan after updates
              
              [View full scan results](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['security', 'dependencies', 'cve', 'hapi-fhir-validation', 'automated-scan'],
              assignees: []  # Add specific assignees if needed
            });
            
            console.log(`Created security issue for hapi-fhir-validation with ${vulnCount} vulnerabilities`);
          } else {
            console.log('Security issue for hapi-fhir-validation already exists');
          }

  summary:
    runs-on: ubuntu-latest
    needs: dependency-scan
    if: always()
    
    steps:
    - name: Generate scan summary
      run: |
        echo "### HAPI FHIR Validation Dependency Scan Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Module**: hapi-fhir-validation" >> $GITHUB_STEP_SUMMARY
        echo "**Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
        echo "**Vulnerabilities Found**: ${{ needs.dependency-scan.outputs.vuln_count || 0 }}" >> $GITHUB_STEP_SUMMARY
        echo "**Status**: ${{ needs.dependency-scan.outputs.has_vulnerabilities == 'true' && '❌ Vulnerabilities detected' || '✅ No vulnerabilities found' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "Scan reports are available as workflow artifacts." >> $GITHUB_STEP_SUMMARY
