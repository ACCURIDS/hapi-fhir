# GitHub Actions workflow for running OWASP Dependency-Check
name: Dependency Check

on:
  push:
    branches:
      - 5.1.0-patch1
  pull_request:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday 9AM UTC

permissions:
  contents: read
  issues: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Dependency-Check Data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check

      - name: Run Dependency-Check (Selected Modules)
        run: |
          # Exit immediately if any command fails
          set -e

          # Define the list of modules to scan
          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          for mod in "${MODULES[@]}"; do
            echo "🔎 Scanning module: $mod"
            LOG_DIR="target/dependency-check/$mod"
            mkdir -p "$LOG_DIR" # Ensure the log directory exists
            
            # Run dependency-check, saving the full Maven output to a log file.
            mvn -B -pl "$mod" org.owasp:dependency-check-maven:check \
              -am \
              -Dformat=ALL \
              -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
              -DoutputDirectory="$LOG_DIR" \
              --log-file "$LOG_DIR/mvn.log"
          done

      - name: Upload Maven Logs on Failure
        # This step only runs if the previous step failed, to help with debugging.
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maven-logs
          path: target/dependency-check/**/*.log
          if-no-files-found: ignore

      - name: Upload Dependency Reports
        # This step will only run if the scan was successful
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: target/dependency-check/**/*
          if-no-files-found: ignore

      - name: Process Module Reports and Create Issues
        id: module-reports
        run: |
          # Create a directory for module-specific issue data
          mkdir -p target/dependency-check/issues
          
          # Define the list of modules to scan
          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          
          for mod in "${MODULES[@]}"; do
            echo "Processing report for module: $mod"
            REPORT_FILE="target/dependency-check/$mod/dependency-check-report.json"
            
            if [ ! -f "$REPORT_FILE" ]; then
              echo "❌ No report found for module $mod"
              continue
            fi
            
            # Count vulnerabilities for this module
            VULN_COUNT=$(jq '[.dependencies[] | select(.vulnerabilities != null and (.vulnerabilities | length) > 0)] | length' "$REPORT_FILE")
            
            if [ "$VULN_COUNT" -gt 0 ]; then
              echo "⚠️  Found $VULN_COUNT vulnerable dependencies in module $mod"
              
              # Extract critical/high vulnerabilities for this module
              CRITICAL_CVES=$(jq -r '
                [.dependencies[] | select(.vulnerabilities != null) | . as $dep | 
                .vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | 
                {
                  dependency: $dep.fileName, 
                  version: $dep.version, 
                  cve: .name, 
                  severity: .severity,
                  description: .description,
                  references: [.references[]?.url?] | join(", ")
                }] | 
                map("• **\(.dependency)@\(.version)** (\(.severity))\n  **CVE:** \(.cve)\n  **Description:** \(.description | sub("\\n"; " ") | .[0:150])...\n  **References:** \(.references)" ) | 
                join("\n\n")
              ' "$REPORT_FILE")
              
              # Extract all vulnerabilities breakdown
              SEVERITY_BREAKDOWN=$(jq -r '
                [.dependencies[].vulnerabilities[]?.severity] | 
                group_by(.) | 
                map("\(.[0]): \(length)") | 
                join(", ")
              ' "$REPORT_FILE")
              
              # Count total dependencies in module
              TOTAL_DEPS=$(jq '.dependencies | length' "$REPORT_FILE")
              
              # Create issue data file for this module
              ISSUE_FILE="target/dependency-check/issues/$mod-issue.md"
              cat > "$ISSUE_FILE" << EOF
              ### Module: $mod
              **Scan Date:** $(date +'%Y-%m-%d %H:%M %Z')
              **Total Dependencies:** $TOTAL_DEPS
              **Vulnerable Dependencies:** $VULN_COUNT
              **Severity Breakdown:** $SEVERITY_BREAKDOWN
              
              ### Critical/High Vulnerabilities:
              $CRITICAL_CVES
              
              ### Full Report:
              The complete dependency check report for this module is available in the workflow artifacts.
              
              ### Recommended Actions:
              1. Review the identified vulnerabilities
              2. Update affected dependencies to patched versions
              3. Consider alternative dependencies if updates are not available
              4. Re-run the scan after making changes
              
              ---
              *This issue was automatically generated by GitHub Actions Dependency Check*
              EOF
              
              echo "Created issue data for module: $mod"
            else
              echo "✅ No vulnerabilities found in module: $mod"
            fi
          done

      - name: Create GitHub Issues for Vulnerable Modules
        run: |
          # Find all module issue files
          ISSUE_FILES=$(find target/dependency-check/issues -name "*.md" -type f)
          
          if [ -z "$ISSUE_FILES" ]; then
            echo "✅ No vulnerabilities found in any module - skipping issue creation."
            exit 0
          fi
          
          for issue_file in $ISSUE_FILES; do
            MODULE_NAME=$(basename "$issue_file" "-issue.md")
            echo "Creating issue for module: $MODULE_NAME"
            
            # Extract title from the first line after the module name
            TITLE="Dependency Check Alert: Vulnerabilities found in $MODULE_NAME module"
            
            # Read the issue content
            ISSUE_CONTENT=$(cat "$issue_file")
            
            # Create the issue using GitHub CLI
            gh issue create \
              --title "$TITLE" \
              --body "$ISSUE_CONTENT" \
              --label "security,dependencies,automated" \
              --repo "$GITHUB_REPOSITORY"
              
            echo "✅ Issue created for module: $MODULE_NAME"
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Install GitHub CLI if not present
        continue-on-error: true

      - name: Create GitHub Issues (Fallback - if gh cli fails)
        if: failure() && steps.module-reports.outcome == 'success'
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          filename: .github/ISSUE_TEMPLATE/dependency-check-fallback.md

      - name: Install GitHub CLI for fallback
        if: failure() && steps.module-reports.outcome == 'success'
        run: |
          # Install GitHub CLI for the fallback step
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
