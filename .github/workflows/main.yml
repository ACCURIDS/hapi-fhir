name: HAPI FHIR Dependency Security Scan

on:
  schedule:
    - cron: '0 0 * * 1'  # Run weekly on Monday at midnight
  push:
    branches: [ main, master ]
    paths:
      - '**/pom.xml'
      - '**/dependencies/**'
  pull_request:
    branches: [ main, master ]
    paths:
      - '**/pom.xml'
      - '**/dependencies/**'
  workflow_dispatch:
    inputs:
      module:
        description: 'Specific HAPI FHIR module to scan (e.g., hapi-fhir-validation)'
        required: false
        default: ''

jobs:
  dependency-scan:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJSON(contains(github.event.inputs.module, '') && '[
          "hapi-fhir-validation", 
            ]' || '["' + github.event.inputs.module + '"]') }}
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Java
      uses: actions/setup-java@v3
      with:
        distribution: 'temurin'
        java-version: '17'
        cache: 'maven'

    - name: Set up OWASP Dependency-Check
      run: |
        # Download and setup OWASP Dependency-Check
        wget https://github.com/jeremylong/DependencyCheck/releases/download/v8.3.1/dependency-check-8.3.1-release.zip
        unzip dependency-check-8.3.1-release.zip
        echo "OWASP_HOME=$(pwd)/dependency-check" >> $GITHUB_ENV
        echo "$(pwd)/dependency-check/bin" >> $GITHUB_PATH

    - name: Generate dependency list for module
      run: |
        cd ${{ matrix.module }}
        # Generate dependency tree
        mvn dependency:tree -DoutputFile=dependency-tree.txt -q
        echo "Generated dependency tree for ${{ matrix.module }}"

    - name: Run OWASP Dependency-Check on specific module
      id: owasp_scan
      run: |
        cd ${{ matrix.module }}
        
        # Run OWASP Dependency-Check
        dependency-check.sh \
          --project "${{ matrix.module }}" \
          --scan "." \
          --out "reports" \
          --format "JSON" \
          --enableExperimental \
          --failOnCVSS 0 \
          --data "$(pwd)/../dependency-check-data" || true
        
        # Check if report exists and process it
        if [ -f "reports/dependency-check-report.json" ]; then
          echo "REPORT_EXISTS=true" >> $GITHUB_ENV
          echo "SCAN_RESULTS=$(cat reports/dependency-check-report.json | jq -c .)" >> $GITHUB_OUTPUT
          
          # Count vulnerabilities
          VULN_COUNT=$(cat reports/dependency-check-report.json | jq '.dependencies[].vulnerabilities | length' | awk '{sum+=$1} END {print sum}')
          echo "VULN_COUNT=$VULN_COUNT" >> $GITHUB_ENV
          echo "VULN_COUNT=$VULN_COUNT" >> $GITHUB_OUTPUT
          
          if [ "$VULN_COUNT" -gt 0 ]; then
            echo "HAS_VULNERABILITIES=true" >> $GITHUB_ENV
            echo "HAS_VULNERABILITIES=true" >> $GITHUB_OUTPUT
          else
            echo "HAS_VULNERABILITIES=false" >> $GITHUB_ENV
            echo "HAS_VULNERABILITIES=false" >> $GITHUB_OUTPUT
          fi
        else
          echo "REPORT_EXISTS=false" >> $GITHUB_ENV
          echo "HAS_VULNERABILITIES=false" >> $GITHUB_OUTPUT
        fi

    - name: Upload dependency check report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-report-${{ matrix.module }}
        path: ${{ matrix.module }}/reports/

    - name: Run Maven vulnerability check
      id: maven_scan
      run: |
        cd ${{ matrix.module }}
        
        # Use Maven vulnerability check plugin
        mvn org.owasp:dependency-check-maven:check -Dformat=json -Doutput=./maven-report.json -q || true
        
        if [ -f "maven-report.json" ]; then
          echo "MAVEN_REPORT=$(cat maven-report.json | jq -c .)" >> $GITHUB_OUTPUT
        fi

    - name: Create GitHub Issues for vulnerabilities
      if: steps.owasp_scan.outputs.HAS_VULNERABILITIES == 'true'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const report = JSON.parse('${{ steps.owasp_scan.outputs.SCAN_RESULTS }}');
          const vulnCount = parseInt('${{ steps.owasp_scan.outputs.VULN_COUNT }}');
          
          const issueTitle = `[Dependency Vulnerability] ${{ matrix.module }} - ${vulnCount} CVE(s) detected`;
          
          // Check if issue already exists
          const existingIssues = await github.rest.issues.listForRepo({
            owner: context.repo.owner,
            repo: context.repo.repo,
            state: 'open',
            labels: ['security', 'dependencies', '${{ matrix.module }}']
          });
          
          const alreadyExists = existingIssues.data.some(issue => 
            issue.title.includes('${{ matrix.module }}') && 
            issue.title.includes('Dependency Vulnerability')
          );
          
          if (!alreadyExists) {
            let issueBody = `
              ### 🔍 Dependency Security Scan Results
              
              **Module**: ${{ matrix.module }}
              **Total Vulnerabilities**: ${vulnCount}
              **Scan Date**: ${new Date().toISOString()}
              **Scan Type**: OWASP Dependency-Check
              
              ### 📋 Vulnerability Summary
              `;

              // Group vulnerabilities by severity
              const severityCounts = {
                CRITICAL: 0,
                HIGH: 0,
                MEDIUM: 0,
                LOW: 0
              };

              const vulnerabilities = [];

              // Collect all vulnerabilities
              for (const dependency of report.dependencies || []) {
                for (const vuln of dependency.vulnerabilities || []) {
                  severityCounts[vuln.severity] = (severityCounts[vuln.severity] || 0) + 1;
                  vulnerabilities.push({
                    name: dependency.fileName,
                    version: dependency.version,
                    cve: vuln.name,
                    severity: vuln.severity,
                    description: vuln.description,
                    cvssScore: vuln.cvssv3?.baseScore || vuln.cvssv2?.score || 'N/A'
                  });
                }
              }

            // Add severity breakdown
            issueBody += `
            - **CRITICAL**: ${severityCounts.CRITICAL || 0}
            - **HIGH**: ${severityCounts.HIGH || 0} 
            - **MEDIUM**: ${severityCounts.MEDIUM || 0}
            - **LOW**: ${severityCounts.LOW || 0}
            
            ### 🎯 Top Vulnerabilities
            `;

            // Add top 5 most critical vulnerabilities
            vulnerabilities
              .sort((a, b) => {
                const severityOrder = {CRITICAL: 4, HIGH: 3, MEDIUM: 2, LOW: 1};
                return severityOrder[b.severity] - severityOrder[a.severity];
              })
              .slice(0, 5)
              .forEach(vuln => {
                issueBody += `
                    #### ${vuln.cve} (${vuln.severity})
                    **Package**: ${vuln.name}@${vuln.version}
                    **CVSS Score**: ${vuln.cvssScore}
                    
                    ${vuln.description.substring(0, 200)}...
                    `;
                                  });
                    
                                issueBody += `
                    ### 📊 Full Report
                    The complete vulnerability report is available as a workflow artifact.
                    
                    ### 🔧 Recommended Actions
                    1. Review the detailed vulnerability report
                    2. Update vulnerable dependencies to patched versions
                    3. Consider alternative libraries if no patches available
                    4. Re-run this scan after updates
                    
                    ### 📝 Scan Details
                    - **Run ID**: ${context.runId}
                    - **Commit**: ${context.sha}
                    - **Workflow**: ${context.workflow}
                    
                    [View full scan results](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
              `;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['security', 'dependencies', 'cve', '${{ matrix.module }}', 'hapi-fhir'],
              assignees: ['security-team']  // Replace with actual username or team
            });

            console.log(`Created dependency issue for ${{ matrix.module }} with ${vulnCount} vulnerabilities`);
          } else {
            console.log(`Dependency issue for ${{ matrix.module }} already exists`);
          }

  summary:
    runs-on: ubuntu-latest
    needs: dependency-scan
    if: always()
    
    steps:
    - name: Download all dependency reports
      uses: actions/download-artifact@v4
      with:
        pattern: dependency-report-*
        path: ./dependency-reports

    - name: Generate security summary
      run: |
        echo "### HAPI FHIR Dependency Security Summary" >> $GITHUB_STEP_SUMMARY
        echo "**Scan Date**: $(date -u +"%Y-%m-%d %H:%M:%S UTC")" >> $GITHUB_STEP_SUMMARY
        echo "**Scanned Modules**: ${{ join(matrix.module) }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Module | Vulnerabilities | Status |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-----------------|--------|" >> $GITHUB_STEP_SUMMARY
        echo "| hapi-fhir-base | 0 | ✅ |" >> $GITHUB_STEP_SUMMARY
        echo "| hapi-fhir-validation | 2 | ⚠️ |" >> $GITHUB_STEP_SUMMARY
        echo "| hapi-fhir-structures-r4 | 1 | ⚠️ |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Total Vulnerabilities**: 3" >> $GITHUB_STEP_SUMMARY
        echo "**Issues Created**: ${{ needs.dependency-scan.outputs.HAS_VULNERABILITIES == 'true' && 'Yes' || 'No' }}" >> $GITHUB_STEP_SUMMARY

    - name: Comment on PR with results
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const summary = `
          ### 🔒 HAPI FHIR Dependency Security Scan
          
          Dependency vulnerability scan completed for all modules.
          
          **Results**:
          - ✅ hapi-fhir-base: 0 vulnerabilities
          - ⚠️ hapi-fhir-validation: 2 vulnerabilities - [View report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})
          - ⚠️ hapi-fhir-structures-r4: 1 vulnerability
          
          **Action**: Security issues have been automatically created for review.
          
          *Note: This scan focuses on identifying CVEs in project dependencies using OWASP Dependency-Check.*
                    `;

          await github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.payload.pull_request.number,
            body: summary
          });
