# GitHub Actions workflow for running OWASP Dependency-Check
name: Dependency Check

on:
  push:
    branches:
      - pipelines
  pull_request:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday 9AM UTC

permissions:
  contents: read
  issues: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Dependency-Check Data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-dependency-check

      - name: Run Dependency-Check (Selected Modules)
        run: |
          # Exit immediately if any command fails
          set -e

          # Define the list of modules to scan
          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          for mod in "${MODULES[@]}"; do
            echo "🔎 Scanning module: $mod"
            LOG_DIR="target/dependency-check/$mod"
            mkdir -p "$LOG_DIR" # Ensure the log directory exists
            
            # Run dependency-check, saving the full Maven output to a log file.
            mvn -B -pl "$mod" org.owasp:dependency-check-maven:check \
              -am \
              -Dformat=ALL \
              -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
              -DoutputDirectory="$LOG_DIR" \
              --log-file "$LOG_DIR/mvn.log"
          done

      - name: Upload Maven Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maven-logs
          path: target/dependency-check/**/*.log
          if-no-files-found: ignore

      - name: Upload Dependency Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: target/dependency-check/**/*
          if-no-files-found: ignore

      - name: Display Dependency Check Results in Logs
        run: |
          echo "📊 DEPENDENCY CHECK RESULTS SUMMARY"
          echo "==================================="
          
          # Define the list of modules to scan
          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          TOTAL_VULNERABILITIES=0
          MODULES_WITH_VULNS=()
          
          for mod in "${MODULES[@]}"; do
            echo ""
            echo "📦 Module: $mod"
            echo "-----------"
            
            REPORT_FILE="target/dependency-check/$mod/dependency-check-report.json"
            
            if [ ! -f "$REPORT_FILE" ]; then
              echo "❌ No report found for this module"
              continue
            fi
            
            # Get basic statistics
            TOTAL_DEPS=$(jq '.dependencies | length' "$REPORT_FILE")
            VULN_DEPS=$(jq '[.dependencies[] | select(.vulnerabilities != null and (.vulnerabilities | length) > 0)] | length' "$REPORT_FILE")
            TOTAL_VULNS=$(jq '[.dependencies[].vulnerabilities[]?] | length' "$REPORT_FILE")
            
            echo "📈 Total Dependencies: $TOTAL_DEPS"
            echo "⚠️  Vulnerable Dependencies: $VULN_DEPS"
            echo "🔴 Total Vulnerabilities: $TOTAL_VULNS"
            
            if [ "$VULN_DEPS" -gt 0 ]; then
              TOTAL_VULNERABILITIES=$((TOTAL_VULNERABILITIES + TOTAL_VULNS))
              MODULES_WITH_VULNS+=("$mod")
              
              # Get severity breakdown
              SEVERITY_BREAKDOWN=$(jq -r '
                [.dependencies[].vulnerabilities[]?.severity] | 
                group_by(.) | 
                map("\(.[0]): \(length)") | 
                join(", ")
              ' "$REPORT_FILE")
              
              echo "📋 Severity Breakdown: $SEVERITY_BREAKDOWN"
              
              # Show top 3 critical/high vulnerabilities
              echo ""
              echo "🚨 Top Critical/High Vulnerabilities:"
              jq -r '
                [.dependencies[] | select(.vulnerabilities != null) | . as $dep | 
                .vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | 
                {
                  dependency: $dep.fileName, 
                  version: $dep.version, 
                  cve: .name, 
                  severity: .severity,
                  score: (.cvssv3.baseScore // .cvssv2.score // "N/A")
                }] | 
                sort_by(.severity) | 
                .[0:3] | 
                .[] | 
                "   • \(.dependency)@\(.version) - \(.cve) (\(.severity), Score: \(.score))"
              ' "$REPORT_FILE"
              
              # Show vulnerable dependencies list
              echo ""
              echo "📋 Vulnerable Dependencies:"
              jq -r '
                [.dependencies[] | select(.vulnerabilities != null and (.vulnerabilities | length) > 0)] | 
                .[] | 
                "   • \(.fileName)@\(.version) - \(.vulnerabilities | length) vuln(s)"
              ' "$REPORT_FILE"
            else
              echo "✅ No vulnerabilities found"
            fi
            
            echo ""
          done
          
          # Overall summary
          echo "🎯 OVERALL SCAN SUMMARY"
          echo "======================"
          echo "📦 Modules Scanned: ${#MODULES[@]}"
          echo "🚨 Modules with Vulnerabilities: ${#MODULES_WITH_VULNS[@]}"
          echo "🔴 Total Vulnerabilities Found: $TOTAL_VULNERABILITIES"
          
          if [ ${#MODULES_WITH_VULNS[@]} -gt 0 ]; then
            echo "📋 Affected Modules: ${MODULES_WITH_VULNS[*]}"
            echo "MODULES_WITH_VULNS=${MODULES_WITH_VULNS[*]}" >> $GITHUB_ENV
          else
            echo "✅ All modules are clean - no vulnerabilities found!"
          fi

      - name: Process Module Reports for GitHub Issues
        if: env.MODULES_WITH_VULNS != ''
        run: |
          # Create a directory for module-specific issue data
          mkdir -p target/dependency-check/issues
          
          IFS=' ' read -ra MODULES <<< "$MODULES_WITH_VULNS"
          
          for mod in "${MODULES[@]}"; do
            echo "Processing detailed report for module: $mod"
            REPORT_FILE="target/dependency-check/$mod/dependency-check-report.json"
            
            # Extract critical/high vulnerabilities for this module
            CRITICAL_CVES=$(jq -r '
              [.dependencies[] | select(.vulnerabilities != null) | . as $dep | 
              .vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | 
              {
                dependency: $dep.fileName, 
                version: $dep.version, 
                cve: .name, 
                severity: .severity,
                description: .description,
                references: [.references[]?.url?] | join(", ")
              }] | 
              map("• **\(.dependency)@\(.version)** (\(.severity))\n  **CVE:** \(.cve)\n  **Description:** \(.description | sub("\\n"; " ") | .[0:150])...\n  **References:** \(.references)" ) | 
              join("\n\n")
            ' "$REPORT_FILE")
            
            # Extract all vulnerabilities breakdown
            SEVERITY_BREAKDOWN=$(jq -r '
              [.dependencies[].vulnerabilities[]?.severity] | 
              group_by(.) | 
              map("\(.[0]): \(length)") | 
              join(", ")
            ' "$REPORT_FILE")
            
            # Count total dependencies in module
            TOTAL_DEPS=$(jq '.dependencies | length' "$REPORT_FILE")
            VULN_COUNT=$(jq '[.dependencies[] | select(.vulnerabilities != null and (.vulnerabilities | length) > 0)] | length' "$REPORT_FILE")
            
            # Create issue data file for this module
            ISSUE_FILE="target/dependency-check/issues/$mod-issue.md"
            
            # Write issue content using printf to avoid heredoc issues
            printf "### Module: %s\n" "$mod" > "$ISSUE_FILE"
            printf "**Scan Date:** %s\n" "$(date +'%Y-%m-%d %H:%M %Z')" >> "$ISSUE_FILE"
            printf "**Total Dependencies:** %s\n" "$TOTAL_DEPS" >> "$ISSUE_FILE"
            printf "**Vulnerable Dependencies:** %s\n" "$VULN_COUNT" >> "$ISSUE_FILE"
            printf "**Severity Breakdown:** %s\n\n" "$SEVERITY_BREAKDOWN" >> "$ISSUE_FILE"
            printf "### Critical/High Vulnerabilities:\n%s\n\n" "$CRITICAL_CVES" >> "$ISSUE_FILE"
            printf "### Full Report:\nThe complete dependency check report for this module is available in the workflow artifacts.\n\n" >> "$ISSUE_FILE"
            printf "### Recommended Actions:\n1. Review the identified vulnerabilities\n2. Update affected dependencies to patched versions\n3. Consider alternative dependencies if updates are not available\n4. Re-run the scan after making changes\n\n" >> "$ISSUE_FILE"
            printf "---\n*This issue was automatically generated by GitHub Actions Dependency Check*\n" >> "$ISSUE_FILE"
            
            echo "Created issue data for module: $mod"
          done

      - name: Create GitHub Issues
        if: env.MODULES_WITH_VULNS != ''
        run: |
          # Install GitHub CLI
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y
          
          # Create issues for each module with vulnerabilities
          IFS=' ' read -ra MODULES <<< "$MODULES_WITH_VULNS"
          for mod in "${MODULES[@]}"; do
            echo "Creating issue for module: $mod"
            ISSUE_FILE="target/dependency-check/issues/$mod-issue.md"
            
            if [ -f "$ISSUE_FILE" ]; then
              TITLE="Dependency Check Alert: Vulnerabilities found in $mod module"
              BODY=$(cat "$ISSUE_FILE")
              
              # Create the issue using GitHub CLI
              gh issue create \
                --title "$TITLE" \
                --body "$BODY" \
                --label "security,dependencies,automated" \
                --repo "$GITHUB_REPOSITORY"
                
              echo "✅ Issue created for module: $mod"
            else
              echo "❌ Issue file not found for module: $mod"
            fi
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Log Clean Scan
        if: env.MODULES_WITH_VULNS == ''
        run: echo "✅ No CVEs found in any module - skipping issue creation."
