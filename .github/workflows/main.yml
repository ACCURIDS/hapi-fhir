name: Dependency Check

on:
  push:
    branches:
      - 5.1.0-patch1
  pull_request:

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      # Always use latest checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup latest stable JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Run OWASP Dependency-Check with Maven
      - name: Run OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check -Dformat=ALL
      # Upload HTML report as artifact
      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          
      name: Dependency Check

on:
  push:
    branches:
      - 5.1.0-patch1
  pull_request:

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check -Dformat=ALL

      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html

      - name: Extract CVE Summary
        id: summary
        run: |
          # Extract basic counts
          TOTAL=$(jq '.dependencies | length' target/dependency-check-report.json)
          VULN=$(jq '[.dependencies[] | select(.vulnerabilities != null)] | length' target/dependency-check-report.json)
          
          # Extract top 3 critical/high CVEs with details
          CRITICAL_CVES=$(jq -r '
            [.dependencies[] | select(.vulnerabilities != null) | . as $dep | 
            .vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | 
            {
              dependency: $dep.fileName, 
              version: $dep.version, 
              cve: .name, 
              severity: .severity,
              description: .description
            }] | 
            .[0:3] | 
            map("• \(.dependency)@\(.version) (\(.severity))\n  CVE: \(.cve)\n  Description: \(.description | sub("\\n"; " ") | .[0:100])...") | 
            join("\n\n")
          ' target/dependency-check-report.json)
          
          # Set default message if no CVEs found
          if [ -z "$CRITICAL_CVES" ]; then
            CRITICAL_CVES="✅ No critical vulnerabilities detected."
          fi
          
          # Calculate severity breakdown
          SEVERITY_BREAKDOWN=$(jq -r '
            [.dependencies[].vulnerabilities[]?.severity] | 
            group_by(.) | 
            map("\(.[0]): \(length)") | 
            join(", ")
          ' target/dependency-check-report.json)
          
          # Set default if no vulnerabilities
          if [ -z "$SEVERITY_BREAKDOWN" ]; then
            SEVERITY_BREAKDOWN="All dependencies secure"
          fi
          
          # Export all variables
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "VULN=$VULN" >> $GITHUB_ENV
          echo "SCAN_DATE=$(date +'%Y-%m-%d %H:%M %Z')" >> $GITHUB_ENV
          echo "SEVERITY_BREAKDOWN=$SEVERITY_BREAKDOWN" >> $GITHUB_ENV
          echo "CRITICAL_CVES<<EOF" >> $GITHUB_ENV
          echo "$CRITICAL_CVES" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "🔍 Dependency Scan Report - ${{ github.repository }}"
          to: yacinbnsalh@gmail.com
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: |
            Hi Team,
            
            Here's the security scan report for ${{ github.repository }}:
            
            📅 Scan Date: ${{ env.SCAN_DATE }}
            📦 Total Dependencies: ${{ env.TOTAL }}
            ⚠️ Vulnerable Dependencies: ${{ env.VULN }}
            🔍 Severity Breakdown: ${{ env.SEVURITY_BREAKDOWN }}
            
            🔥 Critical Findings:
            ${{ env.CRITICAL_CVES }}
            
            ${{ env.VULN == '0' && '✅ All dependencies are secure. No action required.' || '📌 Recommended Actions:
            1. Update critical/high severity dependencies immediately
            2. Review medium/low severity findings
            3. Check attached report for full details' }}
            
            🔗 Report: See attached HTML file for complete analysis.
            
            Regards,
            Security Automation Bot
          attachments: target/dependency-check-report.html
