name: Dependency Check

on:
  push:
    branches:
      - 5.1.0-patch1
  pull_request:

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      # Always use latest checkout
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup latest stable JDK
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Run OWASP Dependency-Check with Maven
      - name: Run OWASP Dependency-Check
        run: mvn org.owasp:dependency-check-maven:check -Dformat=ALL
      # Upload HTML report as artifact
      - name: Upload Dependency Report
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          
      

      # Read report into an environment variable safely
      - name: Extract CVE Summary
        id: summary
        run: |
          TOTAL=$(jq '.dependencies | length' target/dependency-check-report.json)
          VULN=$(jq '[.dependencies[] | select(.vulnerabilities != null)] | length' target/dependency-check-report.json)
          echo "TOTAL=$TOTAL, VULN=$VULN"
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "VULN=$VULN" >> $GITHUB_ENV
      
      - name: Send Email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: "Dependency Check Report - ${{ github.repository }}"
          to: yacinbnsalh@gmail.com
          from: "GitHub Actions <${{ secrets.MAIL_USERNAME }}>"
          body: "Dependency Check Summary:\nTotal dependencies: ${{ env.TOTAL }}\nVulnerable dependencies: ${{ env.VULN }}\nFull report attached."
          attachments: target/dependency-check-report.html
