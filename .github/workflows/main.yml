# GitHub Actions workflow for running OWASP Dependency-Check
name: Dependency Check

on:
  push:
    branches:
      - 5.1.0-patch1
  pull_request:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday 9AM UTC

permissions:
  contents: read
  issues: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Dependency-Check (Selected Modules)
        run: |
          # Define the list of modules to scan
          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          for mod in "${MODULES[@]}"; do
            echo "🔎 Scanning module: $mod"
            # Run dependency-check for each module, placing the report in a unique subdirectory
            # The NVD API key is required for reliable data fetching
            mvn -pl "$mod" org.owasp:dependency-check-maven:check \
              -am \
              -Dformat=ALL \
              -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
              -DoutputDirectory=target/dependency-check/$mod
          done

      - name: Upload Dependency Reports
        # This step runs regardless of whether vulnerabilities were found
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: target/dependency-check/**/*.html
          # If no reports are found, it will gracefully do nothing
          if-no-files-found: ignore

      - name: Aggregate and Summarize Reports
        id: summary
        run: |
          # Find all individual JSON report files generated by the scan
          REPORTS=(target/dependency-check/*/dependency-check-report.json)

          # Check if any report files actually exist before proceeding
          if [ ! -f "${REPORTS[0]}" ]; then
            echo "✅ No dependency-check reports found. Skipping summary and issue creation."
            echo "VULN=0" >> $GITHUB_ENV
            exit 0
          fi

          echo "Found ${#REPORTS[@]} report(s). Merging for summary..."
          
          # Use jq to merge all found reports into a single file for easier processing.
          # This command takes all 'dependencies' arrays from each file, flattens them into one big array,
          # and wraps them in a new JSON object that matches the original report structure.
          jq -s 'map(.dependencies) | flatten | {dependencies: .}' "${REPORTS[@]}" > target/dependency-check/merged-report.json
          MERGED_REPORT="target/dependency-check/merged-report.json"

          # Process the single merged report to get total counts
          TOTAL=$(jq '.dependencies | length' "$MERGED_REPORT")
          VULN=$(jq '[.dependencies[] | select(.vulnerabilities != null and (.vulnerabilities | length) > 0)] | length' "$MERGED_REPORT")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "VULN=$VULN" >> $GITHUB_ENV

          # If vulnerable dependencies were found, extract details for the GitHub issue
          if [ "$VULN" -gt 0 ]; then
            CRITICAL_CVES=$(jq -r '
              [.dependencies[] | select(.vulnerabilities != null) | . as $dep | 
              .vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | 
              {
                dependency: $dep.fileName, 
                version: $dep.version, 
                cve: .name, 
                severity: .severity,
                description: .description
              }] | 
              .[0:3] | # Limit to the top 3 critical/high CVEs for brevity in the issue
              map("• \(.dependency)@\(.version) (\(.severity))\n  CVE: \(.cve)\n  Description: \(.description | sub("\\n"; " ") | .[0:100])...") | 
              join("\n\n")
            ' "$MERGED_REPORT")

            SEVERITY_BREAKDOWN=$(jq -r '
              [.dependencies[].vulnerabilities[]?.severity] | 
              group_by(.) | 
              map("\(.[0]): \(length)") | 
              join(", ")
            ' "$MERGED_REPORT")

            echo "SCAN_DATE=$(date +'%Y-%m-%d %H:%M %Z')" >> $GITHUB_ENV
            echo "SEVERITY_BREAKDOWN=$SEVERITY_BREAKDOWN" >> $GITHUB_ENV
            echo "CRITICAL_CVES<<EOF" >> $GITHUB_ENV
            echo "$CRITICAL_CVES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Create GitHub Issue (if vulnerabilities exist)
        if: env.VULN > 0
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          filename: .github/ISSUE_TEMPLATE/dependency-check.md

      - name: Log Clean Scan
        if: env.VULN == 0
        run: echo "✅ No CVEs found - skipping issue creation."
