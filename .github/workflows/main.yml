name: CVE Scan (hapi-fhir-validation-resources-r5)

on:
  workflow_dispatch:
  schedule:
    - cron: "0 3 * * 1" # Every Monday at 03:00 UTC
  pull_request:
    branches: [ 5.1.0-patch1 ]

permissions:
  contents: read
  security-events: write
  issues: write

env:
  MODULE_PATH: hapi-fhir-validation-resources-r5
  REPORT_DIR: reports
  ISSUE_TITLE: "CVE(s) detected in hapi-fhir-validation-resources-r5 dependencies"

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache OWASP Dependency-Check data
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-dc-data-${{ runner.os }}

      - name: Cache Maven repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ runner.os }}-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            maven-${{ runner.os }}-

      - name: Pre-fetch Maven dependencies for module
        run: mvn -q -pl $MODULE_PATH -am dependency:go-offline

      - name: Run OWASP Dependency-Check
        uses: dependency-check/Dependency-Check_Action@main
        with:
          project: hapi-fhir-validation-resources-r5
          path: ${{ env.MODULE_PATH }}
          format: 'HTML,JSON,SARIF'
          out: ${{ env.REPORT_DIR }}
          args: >-
            --enableRetired

      - name: Upload HTML report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report-r5
          path: ${{ env.REPORT_DIR }}

      - name: Upload SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: ${{ env.REPORT_DIR }}/dependency-check-report.sarif

      - name: Summarize findings
        id: summarize
        run: |
          set -e
          JSON=${REPORT_DIR}/dependency-check-report.json
          if [ ! -f "$JSON" ]; then
            echo "report_json_missing=true" >> $GITHUB_OUTPUT
            exit 0
          fi
          TOTAL=$(jq '[.dependencies[] | select(.vulnerabilities != null) | .vulnerabilities[]] | length' "$JSON")
          CRITICAL=$(jq '[.dependencies[] | select(.vulnerabilities != null) | .vulnerabilities[] | select(.severity == "Critical")] | length' "$JSON")
          HIGH=$(jq '[.dependencies[] | select(.vulnerabilities != null) | .vulnerabilities[] | select(.severity == "High")] | length' "$JSON")
          MEDIUM=$(jq '[.dependencies[] | select(.vulnerabilities != null) | .vulnerabilities[] | select(.severity == "Medium")] | length' "$JSON")
          LOW=$(jq '[.dependencies[] | select(.vulnerabilities != null) | .vulnerabilities[] | select(.severity == "Low")] | length' "$JSON")
          echo "total=$TOTAL" >> $GITHUB_OUTPUT
          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT

      - name: Create or update issue on findings
        if: steps.summarize.outputs.total && fromJSON(steps.summarize.outputs.total) > 0
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const title = process.env.ISSUE_TITLE;
            const total = core.getInput('total', { required: false }) || '${{ steps.summarize.outputs.total }}';
            const critical = '${{ steps.summarize.outputs.critical }}';
            const high = '${{ steps.summarize.outputs.high }}';
            const medium = '${{ steps.summarize.outputs.medium }}';
            const low = '${{ steps.summarize.outputs.low }}';
            const runUrl = `https://github.com/${owner}/${repo}/actions/runs/${context.runId}`;
            const reportArtifact = 'dependency-check-report-r5';

            const body = [
              `OWASP Dependency-Check detected ${total} vulnerability(ies) in module \`${process.env.MODULE_PATH}\`.`,
              '',
              `- Critical: ${critical}`,
              `- High: ${high}`,
              `- Medium: ${medium}`,
              `- Low: ${low}`,
              '',
              `Workflow run: ${runUrl}`,
              '',
              'Download the HTML report from the workflow artifacts for full details.'
            ].join('\n');

            // Try to find an open issue with the same title
            const { data: issues } = await github.rest.issues.listForRepo({ owner, repo, state: 'open' });
            const existing = issues.find(i => i.title === title);

            if (existing) {
              await github.rest.issues.update({ owner, repo, issue_number: existing.number, body });
              core.info(`Updated existing issue #${existing.number}`);
            } else {
              const { data: created } = await github.rest.issues.create({ owner, repo, title, body, labels: ['security', 'dependency'] });
              core.info(`Created issue #${created.number}`);
            }


