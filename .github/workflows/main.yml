name: Dependency Check

on:
  push:
    branches:
      - 5.1.0-patch1
  pull_request:
  schedule:
    - cron: '0 9 * * 1'  # Weekly on Monday 9AM UTC

permissions:
  contents: read
  issues: write

jobs:
  dependency-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Run Dependency-Check (Selected Modules)
        run: |
          MODULES=("hapi-fhir-validation" "hapi-fhir-validation-resources-r5")
          for mod in "${MODULES[@]}"; do
            echo "🔎 Scanning module: $mod"
            mvn -pl "$mod" org.owasp:dependency-check-maven:check \
              -am \
              -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
              -Dformat=ALL \
              -DoutputDirectory=target/dependency-check/$mod
          done

      - name: Upload Dependency Reports
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-reports
          path: target/dependency-check/**/*.html

      - name: Extract CVE Summary
        id: summary
        run: |
          REPORT=$(find target/dependency-check -name "dependency-check-report.json" | head -n 1)

          TOTAL=$(jq '.dependencies | length' "$REPORT")
          VULN=$(jq '[.dependencies[] | select(.vulnerabilities != null)] | length' "$REPORT")

          echo "TOTAL=$TOTAL" >> $GITHUB_ENV
          echo "VULN=$VULN" >> $GITHUB_ENV

          if [ "$VULN" -gt 0 ]; then
            CRITICAL_CVES=$(jq -r '
              [.dependencies[] | select(.vulnerabilities != null) | . as $dep | 
              .vulnerabilities[] | select(.severity == "HIGH" or .severity == "CRITICAL") | 
              {
                dependency: $dep.fileName, 
                version: $dep.version, 
                cve: .name, 
                severity: .severity,
                description: .description
              }] | 
              .[0:3] | 
              map("• \(.dependency)@\(.version) (\(.severity))\n  CVE: \(.cve)\n  Description: \(.description | sub(\"\\n\"; \" \") | .[0:100])...") | 
              join("\n\n")
            ' "$REPORT")

            SEVERITY_BREAKDOWN=$(jq -r '
              [.dependencies[].vulnerabilities[]?.severity] | 
              group_by(.) | 
              map("\(.[0]): \(length)") | 
              join(", ")
            ' "$REPORT")

            echo "SCAN_DATE=$(date +'%Y-%m-%d %H:%M %Z')" >> $GITHUB_ENV
            echo "SEVERITY_BREAKDOWN=$SEVERITY_BREAKDOWN" >> $GITHUB_ENV
            echo "CRITICAL_CVES<<EOF" >> $GITHUB_ENV
            echo "$CRITICAL_CVES" >> $GITHUB_ENV
            echo "EOF" >> $GITHUB_ENV
          fi

      - name: Create GitHub Issue (if vulnerabilities exist)
        if: env.VULN > 0
        uses: JasonEtco/create-an-issue@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          filename: .github/ISSUE_TEMPLATE/dependency-check.md

      - name: Log Clean Scan (Optional)
        if: env.VULN == 0
        run: echo "✅ No CVEs found - skipping issue creation"
